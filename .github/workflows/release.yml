name: Release

on:
  push:
    tags:
      - '[0-9]*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify version sync
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          MF_VER=$(node -p "require('./manifest.json').version")
          echo "package.json: $PKG_VER | manifest.json: $MF_VER"
          if [ "$PKG_VER" != "$MF_VER" ]; then
            echo "::error::package.json 版本($PKG_VER) 与 manifest.json 版本($MF_VER) 不一致。请先同步两者，否则 webapp 版本守卫会误判，导致标准安装用户重复自举下载。"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build webapp (内联 CSS + 内联 bundle 生成自包含 webapp/app.html)
        run: node scripts/bundle-webapp.mjs

      - name: Type check
        run: npx tsc --noEmit

      - name: Test (host)
        run: npm run test:host

      - name: Test (webapp)
        run: npm run test

      - name: Build main.js
        run: node esbuild.config.mjs production

      - name: Package webapp
        run: |
          cd webapp
          zip -r ../webapp.zip . -x "*.DS_Store"
          cd ..

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            webapp.zip

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            main.js
            manifest.json
            styles.css
            author-avatar.jpg
            webapp.zip
          generate_release_notes: true
