<!DOCTYPE html>
<html lang="zh-CN" class="theme-bamboo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="description" content="Bamboo Immortals - 每日复盘应用">

<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%232D5A27' width='180' height='180' rx='40'/><path d='M90 40v100M90 60l-20 10M90 60l20 10M90 90l-15 7.5M90 90l15 7.5' stroke='%23ffffff' stroke-width='8' stroke-linecap='round'/></svg>">
<title>Bamboo Immortals</title>
<style data-src="assets/styles/variables.css">
/* ========== 全局变量（竹林中国风 - 亮色模式） ========== */
:host {
    /* === 主题色相（可变）=== */
    --accent-hue: 120;  /* 默认竹青绿，可通过 DisplayManager 色相滑块调整 */

    /* === 明度偏移（可变）=== */
    --accent-lightness-offset: 0%;  /* 默认 0%，可通过 DisplayManager 明度滑块调整（范围 ~-15% ~ +15%）*/

    /* === 基础色彩系统（HSL 动态生成）=== */
    --bamboo-deep: hsl(calc(var(--accent-hue) - 7), 40%, calc(25% + var(--accent-lightness-offset)));
    --bamboo-deep-rgb: 45, 90, 39;
    --bamboo-dark: hsl(calc(var(--accent-hue) - 8), 39%, calc(34% + var(--accent-lightness-offset)));
    --bamboo-primary: hsl(var(--accent-hue), 27%, calc(48% + var(--accent-lightness-offset)));
    --bamboo-light: hsl(var(--accent-hue), 33%, calc(61% + var(--accent-lightness-offset)));
    --bamboo-pale: hsl(var(--accent-hue), 35%, calc(75% + var(--accent-lightness-offset)));
    --bamboo-primary-light: hsl(var(--accent-hue), 39%, calc(80% + var(--accent-lightness-offset)));
    --primary-rgb: 90, 154, 90;
    --deep-rgb: 45, 90, 39;
    --danger-rgb: 201, 72, 59;
    --gold-rgb: 212, 175, 55;
    /* 中性通道（禁止再写裸 255,255,255 / 0,0,0，统一走令牌） */
    --white-rgb: 255, 255, 255;
    --black-rgb: 0, 0, 0;
    --rice-paper-rgb: 250, 248, 240;
    /* 纯色实色通道（禁止再写裸 #fff / #000，统一走令牌；暗色下白仍是白，无需重定义） */
    --white: #ffffff;
    --black: #000000;
    /* 纯色不透明表面（亮色纯白 / 暗色深表面，随主题自适应） */
    --surface-solid: #ffffff;
    --pale-rgb: 168, 213, 168;
    --sky-azure-rgb: 135, 206, 235;
    --health-success-rgb: 126, 211, 33;
    --ticket-stub-bg-rgb: 148, 198, 148;
    --dark-surface-mid-rgb: 30, 50, 32;
    --dark-surface-rgb: 20, 38, 22;
    --gray-rgb: 149, 165, 166;
    --danger-alt-rgb: 231, 76, 60;
    --warning-yellow-rgb: 251, 191, 36;
    --warning-orange-rgb: 245, 166, 35;
    --info-blue-rgb: 66, 133, 244;
    --teal-rgb: 26, 167, 106;
    --danger-bright-rgb: 239, 68, 68;
    --amber-rgb: 230, 162, 60;
    --purple-rgb: 154, 90, 154;
    --purple-pale-rgb: 196, 138, 196;
    --mint-rgb: 168, 230, 207;
    --gold-bright-rgb: 255, 215, 0;
    --pale-green-rgb: 245, 250, 245;
    --pale-green-alt-rgb: 248, 252, 248;
    --surface-deep-rgb: 20, 35, 20;
    --surface-deep-alt-rgb: 25, 40, 25;
    --primary-alt-rgb: 107, 174, 107;
    --danger-soft-rgb: 220, 100, 100;
    --red-pale-rgb: 255, 240, 240;
    --amber-brown-rgb: 180, 140, 100;
    --gray-mid-rgb: 90, 90, 90;
    --green-pale-rgb: 200, 224, 200;
    --green-bright-rgb: 143, 216, 143;
    --amber-deep-rgb: 245, 158, 11;
    --orange-pale-rgb: 252, 191, 73;
    --blue-alt-rgb: 74, 144, 217;
    --danger-deep-rgb: 220, 38, 38;
    --gray-alt-rgb: 107, 114, 128;
    --red-bright-rgb: 200, 80, 80;
    --green-alt-rgb: 180, 220, 165;
    --green-very-bright-rgb: 200, 255, 150;
    --overdue-bg-rgb: 255, 240, 240;
    --overdue-bg-mid-rgb: 255, 235, 235;
    --overdue-bg-light-rgb: 255, 230, 230;
    --ticket-gold: #B8860B;
    --bamboo-text-muted: var(--ink-pale);
    --bamboo-text-secondary: var(--ink-light);
    --bamboo-border: rgba(var(--primary-rgb), 0.25);
    --bamboo-background: rgba(var(--primary-rgb), 0.06);
    --bamboo-primary-dark: var(--bamboo-dark);
    --bamboo-success: var(--bamboo-primary);
    --bamboo-warning: #c9a227;
    --bamboo-warning-pale: #fff59d;
    --bamboo-error: #dc3545;
    --bamboo-card: var(--card-bg);
    --sky-azure: #87CEEB;
    --sky-pale: #B8E2F8;
    --sky-mist: #E8F6FC;
    --leaf-green: #6B8E23;
    --leaf-light: #8FBC3A;
    --rice-paper: #FAF8F0;
    --ivory: #FFFFF0;
    --cinnabar: #C9483B;
    --gold: #D4AF37;

    /* === 健康评分色彩系统 === */
    --health-danger: #EF4444;
    --health-warning: #F59E23;
    --health-success-clr: #7ED321;
    --health-info: #4A90D9;
    --health-neutral: #95A5A6;
    --health-pink: #E91E63;
    --health-purple: #9C27B0;
    --health-orange: #FF9800;
    --health-gold-clr: #D97706;

    /* === 文字色彩系统 === */
    --ink-dark: #1A1A1A;
    --ink-medium: #404040;
    --ink-light: #555555;
    --ink-pale: #707070;

    /* === 背景色彩系统 - 重新设计：淡雅意境 === */
    --bg-gradient-start: hsl(var(--accent-hue), 18%, calc(96% + var(--accent-lightness-offset)));
    --bg-gradient-mid1: hsl(var(--accent-hue), 21%, calc(94% + var(--accent-lightness-offset)));
    --bg-gradient-mid2: hsl(var(--accent-hue), 17%, calc(90% + var(--accent-lightness-offset)));
    --bg-gradient-end: hsl(var(--accent-hue), 20%, calc(95% + var(--accent-lightness-offset)));
    --card-bg: rgba(var(--white-rgb), 0.60);
    --card-glass: rgba(var(--white-rgb), 0.55);

    /* === 文字语义变量 === */
    --text-primary: var(--ink-dark);
    --text-secondary: var(--ink-light);
    --text-tertiary: var(--ink-pale);

    /* === 边框与阴影 === */
    --border-light: rgba(var(--primary-rgb), 0.25);
    --shadow: 0 20px 40px rgba(var(--deep-rgb), 0.12);
    
    /* === 统一过渡动画曲线 === */
    --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    
    /* === 点击反馈缩放比例 === */
    --scale-click: scale(0.96);
    --scale-tiny: scale(0.98);
    --scale-small: scale(0.95);
    
    /* === 动画性能优化 === */
    --will-change-transform: transform;
    --will-change-opacity: opacity;
    
    /* === 阴影深度系统 === */
    --shadow-surface: 0 2px 8px rgba(var(--deep-rgb), 0.06), 0 1px 2px rgba(var(--deep-rgb), 0.04);    /* 表层 - 卡片内元素 */
    --shadow-card: 0 4px 16px rgba(var(--deep-rgb), 0.08), 0 2px 4px rgba(var(--deep-rgb), 0.04);      /* 中层 - 基础卡片 */
    --shadow-elevated: 0 8px 28px rgba(var(--deep-rgb), 0.12), 0 4px 8px rgba(var(--deep-rgb), 0.06);  /* 高层 - 悬停/弹窗 */
    --shadow-floating: 0 16px 48px rgba(var(--deep-rgb), 0.16), 0 8px 16px rgba(var(--deep-rgb), 0.08); /* 浮层 - FAB/模态框 */
    
    /* === 按钮样式系统 === */
    --btn-primary-bg: linear-gradient(135deg, var(--bamboo-dark) 0%, var(--bamboo-primary) 100%);
    --btn-primary-hover: linear-gradient(135deg, var(--bamboo-primary) 0%, var(--bamboo-light) 100%);
    --btn-secondary-bg: rgba(var(--primary-rgb), 0.1);
    --btn-secondary-hover: rgba(var(--primary-rgb), 0.2);
    --btn-outline-border: 2px solid var(--bamboo-primary);
    --btn-outline-hover: rgba(var(--primary-rgb), 0.1);

    /* === 渐变变量 === */
    --section-title-gradient: linear-gradient(135deg, rgba(var(--deep-rgb), 0.45) 0%, rgba(var(--primary-rgb), 0.4) 50%, rgba(var(--primary-rgb), 0.35) 100%);
    --action-bg: linear-gradient(135deg, rgba(var(--primary-rgb), 0.55) 0%, rgba(var(--primary-rgb), 0.5) 100%);

    /* === 表格样式 === */
    --table-header-bg: rgba(var(--primary-rgb), 0.1);
    --table-border: rgba(var(--primary-rgb), 0.1);

    /* === 诊断卡片样式 === */
    --diagnosis-bg: rgba(var(--rice-paper-rgb), 0.8);
    --diagnosis-border: rgba(var(--primary-rgb), 0.1);
    --diagnosis-text: var(--ink-dark);
    --diagnosis-card-good-bg: rgba(var(--primary-rgb), 0.08);
    --diagnosis-card-warn-bg: rgba(var(--gold-rgb), 0.08);

    /* === 时间线样式 === */
    --timeline-stat-bg: rgba(var(--primary-rgb), 0.1);
    --progress-bg: rgba(var(--primary-rgb), 0.1);

    /* === KPI 卡片样式 === */
    --kpi-up-bg: linear-gradient(180deg, var(--card-bg) 0%, rgba(var(--danger-rgb), 0.1) 100%);
    --kpi-down-bg: linear-gradient(180deg, var(--card-bg) 0%, rgba(var(--primary-rgb), 0.1) 100%);
    --kpi-neutral-bg: linear-gradient(180deg, var(--card-bg) 0%, rgba(var(--gold-rgb), 0.1) 100%);
    --kpi-break-bg: linear-gradient(180deg, var(--card-bg) 0%, rgba(var(--sky-azure-rgb), 0.1) 100%);
    --kpi-up-border: rgba(var(--danger-rgb), 0.3);
    --kpi-up-delta-color: var(--cinnabar);

    /* === 呼吸动画 === */
    --breath-color: rgba(var(--primary-rgb), 0.4);

    /* === 标签样式 === */
    --tag-execute-bg: var(--bamboo-primary);
    --tag-miss-bg: var(--ink-pale);
    --tag-text-light: white;

    /* === 波浪与毛玻璃 === */
    --wave-color: rgba(var(--primary-rgb), 0.5);
    --glass-blur: 20px;
    --glass-highlight-strong: rgba(var(--white-rgb), 0.6);
    --glass-highlight-medium: rgba(var(--white-rgb), 0.4);
    --glass-highlight-soft: rgba(var(--white-rgb), 0.2);
    --glass-highlight-subtle: rgba(var(--white-rgb), 0.1);
    --glass-highlight-faint: rgba(var(--white-rgb), 0.04);
    --glass-highlight-wash: rgba(var(--white-rgb), 0.08);

    /* === 圆角系统（统一为 2px 倍数，覆盖现网所有取值） ===
       映射约定（代码禁止再写裸 px 圆角）：
         2px→--radius-3xs   6px→--radius-2xs   8px→--radius-xs   10px→--radius-sm
         12px→--radius-md   14px→--radius-lg   16px→--radius-xl   18px→--radius-2xl
         20px→--radius-3xl  24px→--radius-4xl  28px→--radius-5xl
    */
    --radius-3xs: 2px;
    --radius-2xs: 6px;
    --radius-xs: 8px;
    --radius-sm: 10px;
    --radius-md: 12px;
    --radius-lg: 14px;
    --radius-xl: 16px;
    --radius-2xl: 18px;
    --radius-3xl: 20px;
    --radius-4xl: 24px;
    --radius-5xl: 28px;
    /* 补充散落档位（代码禁止再用裸 px 圆角） */
    --radius-1: 1px;
    --radius-2-5: 2.5px;
    --radius-3: 3px;
    --radius-4: 4px;
    --radius-5: 5px;
    --radius-26: 26px;
    --radius-38: 38px;
    --radius-pill: 9999px;

    /* === 间距系统（统一为 8px 网格） === */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 28px;
    --space-8: 32px;

    /* === 字体系统 ===
       唯一标准：流体 --type-*（带 clamp，自适应视口）。
       下方 --font-size-* 仅为兼容别名，已映射到 --type-*，新代码禁止直接使用。
    */
    --font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-size-scale: 1;
    --section-gap-scale: 0.8;
    --font-size-xs: var(--type-xs);
    --font-size-sm: var(--type-sm);
    --font-size-base: var(--type-base);
    --font-size-md: var(--type-md);
    --font-size-lg: var(--type-lg);
    --font-size-xl: var(--type-xl);
    --font-size-2xl: var(--type-2xl);
    --line-height-tight: 1.3;
    --line-height-base: 1.5;
    --line-height-relaxed: 1.75;

    /* === 触控尺寸系统 === */
    --touch-min: 44px;
    --touch-comfortable: 48px;
    --touch-target: 44px;

    /* === Focus 样式系统（统一使用 box-shadow 格式） === */
    --focus-ring: 0 0 0 2px var(--bamboo-primary);
    --focus-ring-offset: 0 0 0 4px rgba(var(--primary-rgb), 0.25);
    --focus-ring-danger: 0 0 0 2px var(--cinnabar);
    --focus-transition: box-shadow 0.15s ease;

    /* === 状态色系统 === */
    --status-success: var(--bamboo-primary);
    --status-warning: var(--gold);
    --status-danger: var(--cinnabar);
    --status-info: #4FC3F7;
    --status-success-bg: rgba(var(--primary-rgb), 0.1);
    --status-warning-bg: rgba(var(--gold-rgb), 0.1);
    --status-danger-bg: rgba(var(--danger-rgb), 0.1);
    --status-info-bg: rgba(var(--info-rgb), 0.1);
    --info-rgb: 79, 195, 247;
    /* === 竹林绿辉光阴影（自适应暗色模式） === */
    --bamboo-glow-sm: 0 2px 8px rgba(var(--primary-rgb), 0.4);
    --bamboo-glow-xs: 0 1px 4px rgba(var(--primary-rgb), 0.3);

    /* === 浮层设计令牌（Toast / Confirm / 选择器统一语言：留白素笺） === */
    --overlay-surface: var(--card-bg);
    --overlay-border-width: 1px;
    --overlay-border-style: solid;
    --overlay-border-color: var(--bamboo-border);
    --overlay-border: var(--overlay-border-width) var(--overlay-border-style) var(--overlay-border-color);
    --overlay-shadow: 0 6px 28px rgba(26, 40, 24, 0.12);
    --overlay-shadow-soft: 0 2px 12px rgba(26, 40, 24, 0.08);
    --ease-cn: cubic-bezier(0.22, 0.61, 0.36, 1);

    /* === 内容宽度系统（用户可调） === */
    --content-max-width: 800px;
    --content-max-width-wide: 880px;  /* 宽屏默认，用户设置后此值同步更新 */

    /* === 动效时长系统 === */
    --duration-instant: 100ms;
    --duration-fast: 200ms;
    --duration-normal: 300ms;
    --duration-slow: 500ms;
    --duration-slower: 800ms;
}

/* ========== 暗色模式（竹林星光暗色，完整覆盖所有变量） ========== */
:host(.dark) {
    /* 竹林星光 — 深邃、高级、有层次感的暗色背景 */
    --primary-rgb: 130, 195, 130;
    --deep-rgb: 45, 90, 53;
    --danger-rgb: 255, 107, 107;
    --danger-alt-rgb: 255, 107, 107;
    --gold-rgb: 255, 217, 61;
    /* 中性通道（暗色同样禁止裸白/黑字面量） */
    --white-rgb: 255, 255, 255;
    --black-rgb: 0, 0, 0;
    --rice-paper-rgb: 250, 248, 240;
    /* 纯色不透明表面（暗色深表面，随主题自适应） */
    --surface-solid: #1c2a1e;
    --pale-rgb: 184, 216, 184;
    --sky-azure-rgb: 116, 192, 252;
    --health-success-rgb: 126, 211, 33;
    --danger-bright-rgb: 255, 107, 107;
    --amber-rgb: 245, 166, 35;
    --purple-rgb: 154, 90, 154;
    --purple-pale-rgb: 196, 138, 196;
    --mint-rgb: 168, 230, 207;
    --gold-bright-rgb: 255, 215, 0;
    --pale-green-rgb: var(--pale-green-rgb-dark, 30, 50, 32);
    --pale-green-alt-rgb: var(--pale-green-alt-rgb-dark, 25, 45, 27);
    --surface-deep-rgb: 15, 25, 15;
    --overdue-bg-rgb: 75, 50, 50;
    --overdue-bg-mid-rgb: 65, 45, 45;
    --overdue-bg-light-rgb: 55, 35, 35;
    --surface-dark-rgb: 20, 38, 22;
    --surface-dark-rgb-mid: 25, 48, 28;
    --surface-dark-rgb-end: 30, 55, 32;
    --primary-alt-rgb: 130, 195, 130;
    --danger-soft-rgb: 255, 120, 120;
    --red-pale-rgb: 40, 20, 20;
    --gray-mid-rgb: 120, 120, 120;
    --green-pale-rgb: 25, 45, 27;
    --amber-deep-rgb: 245, 158, 11;
    --orange-pale-rgb: 180, 120, 50;
    --blue-alt-rgb: 74, 144, 217;
    --danger-deep-rgb: 255, 107, 107;
    --gray-alt-rgb: 149, 165, 166;
    --red-bright-rgb: 255, 120, 120;
    --green-alt-rgb: 130, 195, 130;
    --green-very-bright-rgb: 150, 230, 100;
    --jade-cream-rgb: 255, 250, 240;
    --jade-cream-mid-rgb: 255, 245, 230;
    --jade-cream-deep-rgb: 255, 240, 220;
    --jade-warm-rgb: 255, 235, 210;
    --jade-dark-rgb: 65, 55, 45;
    --jade-dark-mid-rgb: 55, 45, 35;
    --jade-dark-deep-rgb: 45, 35, 25;
    --jade-dark-warm-rgb: 75, 60, 45;
    --jade-dark-warm-mid-rgb: 65, 50, 35;
    --jade-dark-warm-light-rgb: 55, 42, 28;
    
    /* 文字：柔和但清晰，亮度提升以通过 WCAG AA 4.5:1（暗色卡片背景 ~10% L） */
    --ink-dark: hsl(var(--accent-hue), 18%, calc(91% + var(--accent-lightness-offset)));
    --ink-medium: hsl(var(--accent-hue), 20%, calc(81% + var(--accent-lightness-offset)));
    --ink-light: hsl(var(--accent-hue), 17%, calc(70% + var(--accent-lightness-offset)));
    --ink-pale: hsl(var(--accent-hue), 6%, calc(60% + var(--accent-lightness-offset)));
    --bamboo-text-muted: hsl(var(--accent-hue), 6%, calc(60% + var(--accent-lightness-offset)));
    --bamboo-text-secondary: hsl(var(--accent-hue), 20%, calc(81% + var(--accent-lightness-offset)));
    
    /* 竹林色调：降低饱和度，增添银灰质感（跟随 --accent-hue） */
    --bamboo-deep: hsl(calc(var(--accent-hue) + 5), 34%, calc(26% + var(--accent-lightness-offset)));
    --bamboo-dark: hsl(calc(var(--accent-hue) + 6), 35%, calc(25% + var(--accent-lightness-offset)));
    --bamboo-primary: hsl(calc(var(--accent-hue) + 2), 25%, calc(47% + var(--accent-lightness-offset)));
    --bamboo-light: hsl(var(--accent-hue), 39%, calc(65% + var(--accent-lightness-offset)));
    --bamboo-pale: hsl(var(--accent-hue), 30%, calc(78% + var(--accent-lightness-offset)));
    --bamboo-primary-light: rgba(var(--primary-rgb), 0.6);
    --bamboo-warning: #ffe082;
    --bamboo-warning-pale: #fffde7;
    --bamboo-error: #ef5350;
    --bamboo-success: var(--bamboo-primary);
    --bamboo-background: rgba(var(--primary-rgb), 0.1);
    --bamboo-primary-dark: var(--bamboo-dark);
    --bamboo-card: var(--card-bg);
    
    /* 背景层次：深邃午夜绿渐变 —— 明度跨度拉大（7%→16%），中段加一道柔光带，
       让暗色下的整页页面级渐变清晰可辨，而非近乎平涂的深色 */
    --bg-gradient-start: hsl(calc(var(--accent-hue) + 16), 30%, calc(13% + var(--accent-lightness-offset)));
    --bg-gradient-mid1: hsl(calc(var(--accent-hue) + 6), 34%, calc(7% + var(--accent-lightness-offset)));
    --bg-gradient-mid2: hsl(calc(var(--accent-hue) + 28), 38%, calc(16% + var(--accent-lightness-offset)));
    --bg-gradient-end: hsl(calc(var(--accent-hue) + 2), 30%, calc(9% + var(--accent-lightness-offset)));
    
    /* 卡片：深邃中透出微光，跟随色相和明度 */
    /* 暗色已全局关闭 backdrop-filter（dark.css :host(.dark) *），原"提高不透明度防模糊伪影"
       的理由已不存在；此处保留一定透明度，让整页页面级渐变能透过卡片显现 */
    --card-bg: hsla(var(--accent-hue), 18%, calc(10% + var(--accent-lightness-offset)), 0.60);

    box-shadow: 0 2px 8px rgba(var(--bamboo-deep-rgb), 0.1);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 20;
}
.ticket-dot:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
.ticket-dot.has-data {
    background: var(--bamboo-primary);
    box-shadow: inset 0 1px 2px rgba(var(--black-rgb), 0.08), 0 0 3px rgba(var(--primary-rgb), 0.25);
}
.ticket-dot.current {
    background: var(--bamboo-light);
    box-shadow: inset 0 1px 2px rgba(var(--black-rgb), 0.08), 0 0 4px rgba(var(--primary-rgb), 0.3);
}
@media (prefers-reduced-motion: no-preference) {
    .ticket-dot.current {
        animation: dotBreath 3s ease-in-out infinite;
    }
}
@keyframes dotBreath {
    0%, 100% { transform: scale(1); box-shadow: inset 0 1px 2px rgba(var(--black-rgb), 0.08), 0 0 3px rgba(var(--primary-rgb), 0.25); }
    50%      { transform: scale(1.4); box-shadow: inset 0 1px 2px rgba(var(--black-rgb), 0.08), 0 0 6px rgba(var(--primary-rgb), 0.4), 0 0 8px rgba(var(--primary-rgb), 0.15); }
}

.ticket-highlight {
    text-align: center;
    flex: 0 0 auto;
    background: 
        linear-gradient(135deg, rgba(var(--white-rgb), 0.12) 0%, rgba(var(--white-rgb), 0.05) 100%),
        linear-gradient(45deg, rgba(var(--bamboo-deep-rgb),0.06) 0%, transparent 60%);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border-radius: var(--radius-lg);
    padding: 10px 20px 10px;
    border: 1px solid rgba(var(--white-rgb), 0.25);
    height: 56px;
    width: min(110px, 30vw);
    box-shadow: 
        0 4px 16px rgba(var(--bamboo-deep-rgb),0.15),
        inset 0 2px 0 rgba(var(--white-rgb), 0.3),
        inset 0 -2px 0 rgba(var(--bamboo-deep-rgb),0.08);
    animation: heartbeat 2s ease-in-out infinite;
    position: relative;
    overflow: hidden;
}

.ticket-highlight::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(var(--white-rgb), 0.15) 0%, transparent 100%);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    pointer-events: none;
}

@keyframes heartbeat {
    0%, 100% {
        transform: scale(1);
        box-shadow: 
            0 4px 16px rgba(var(--bamboo-deep-rgb),0.15),
            inset 0 2px 0 rgba(var(--white-rgb), 0.3),
            inset 0 -2px 0 rgba(var(--bamboo-deep-rgb),0.08);
    }
    15% {
        transform: scale(1.05);
        box-shadow: 
            0 8px 24px rgba(var(--bamboo-deep-rgb),0.25),
            inset 0 2px 0 rgba(var(--white-rgb), 0.4),
            inset 0 -2px 0 rgba(var(--bamboo-deep-rgb),0.1);
    }
    30% {
        transform: scale(1);
        box-shadow: 
            0 4px 16px rgba(var(--bamboo-deep-rgb),0.15),
            inset 0 2px 0 rgba(var(--white-rgb), 0.3),
            inset 0 -2px 0 rgba(var(--bamboo-deep-rgb),0.08);
    }
    45% {
        transform: scale(1.03);
        box-shadow: 
            0 6px 20px rgba(var(--bamboo-deep-rgb),0.2),
            inset 0 2px 0 rgba(var(--white-rgb), 0.35),
            inset 0 -2px 0 rgba(var(--bamboo-deep-rgb),0.09);
    }
    60% {
        transform: scale(1);
        box-shadow: 
            0 4px 16px rgba(var(--bamboo-deep-rgb),0.15),
            inset 0 2px 0 rgba(var(--white-rgb), 0.3),
            inset 0 -2px 0 rgba(var(--bamboo-deep-rgb),0.08);
    }
}

.ticket-highlight-value {
    font-size: var(--type-heading);
    font-weight: 900;
    color: var(--bamboo-primary);
    line-height: 1;
    margin-bottom: 3px;
}

.ticket-highlight-label {
    font-size: var(--type-mini);
    color: rgba(var(--bamboo-deep-rgb), 0.8);
    letter-spacing: 2px;
}

.ticket-pattern {
    position: absolute;
    top: 0;
    right: 0;
    width: min(80px, 22vw);
    height: 100%;
    background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(var(--white-rgb), 0.02) 10px,
        rgba(var(--white-rgb), 0.02) 20px
    );
    pointer-events: none;
}

.ticket-stub-content {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: var(--space-2);
    padding: 20px 8px 8px;
    position: relative;
    z-index: 2;
    pointer-events: none;
}

.ticket-stub-content > * {
    pointer-events: none;
}

.ticket-stub-title-box {
    pointer-events: auto;
    cursor: pointer;
    background: 
        linear-gradient(135deg, rgba(var(--white-rgb), 0.25) 0%, rgba(var(--white-rgb), 0.08) 50%, rgba(var(--white-rgb), 0.15) 100%),
        linear-gradient(45deg, rgba(var(--bamboo-deep-rgb),0.12) 0%, transparent 60%);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border-radius: var(--radius-md);
    padding: 14px 12px;
    text-align: center;
    border: 1px solid rgba(var(--white-rgb), 0.35);
    width: min(120px, 33vw);
    min-height: 70px;
    height: auto;
    box-shadow: 
        0 4px 16px rgba(var(--bamboo-deep-rgb),0.15),
        inset 0 2px 0 rgba(var(--white-rgb), 0.5),
        inset 0 -2px 0 rgba(var(--bamboo-deep-rgb),0.12),
        inset 2px 0 0 rgba(var(--white-rgb), 0.2),
        inset -2px 0 0 rgba(var(--white-rgb), 0.2);
    position: relative;
    z-index: 100;
    overflow: hidden;
}

.ticket-stub-title-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60%;
    background: linear-gradient(180deg, rgba(var(--white-rgb), 0.2) 0%, transparent 100%);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    pointer-events: none;
}

.ticket-stub-title-box::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        repeating-linear-gradient(
            90deg,
            transparent,
            transparent 2px,
            rgba(var(--white-rgb), 0.04) 2px,
            rgba(var(--white-rgb), 0.04) 4px
        );
    border-radius: var(--radius-lg);
    pointer-events: none;
}

.stub-title-cn {
    font-size: var(--type-md);
    font-weight: 800;
    color: var(--bamboo-deep);
    letter-spacing: 3px;
    line-height: 1.3;
}

.stub-title-en {
    font-size: var(--type-mini);
    color: rgba(var(--bamboo-deep-rgb), 0.55);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
}

.ticket-stub-date {
    font-size: var(--type-mini);
    color: rgba(var(--bamboo-deep-rgb), 0.55);
    letter-spacing: 1px;
    text-align: center;
}

.ticket-slogan {
    font-size: var(--type-mini);
    color: rgba(var(--bamboo-deep-rgb), 0.4);
    letter-spacing: 4px;
    text-align: center;
    font-weight: 400;
    flex-shrink: 0;
}

.ticket-decorations {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
}

.ticket-decoration {
    flex: 1;
    height: 40px;
    position: relative;
    display: flex;
    align-items: center;
}

.ticket-decoration.left {
    justify-content: flex-start;
    height: auto;
    flex: 0 0 auto;
    width: auto;
}

.ticket-decoration.right {
    justify-content: flex-end;
    height: auto;
    flex: 0 0 auto;
    width: auto;
}

.ticket-decoration::before,
.ticket-decoration::after {
    display: none;
}

.ticket-decoration.left::before,
.ticket-decoration.right::before {
    content: '';
    display: block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(var(--bamboo-deep-rgb), 0.25);
    position: relative;
}

.ticket-decoration.left::before {
    margin-left: 20px;
    box-shadow: 
        16px 0 0 rgba(var(--bamboo-deep-rgb), 0.15),
        32px 0 0 rgba(var(--bamboo-deep-rgb), 0.1);
}

.ticket-decoration.right::before {
    margin-right: 20px;
    box-shadow: 
        -16px 0 0 rgba(var(--bamboo-deep-rgb), 0.15),
        -32px 0 0 rgba(var(--bamboo-deep-rgb), 0.1);
}

@media (prefers-reduced-motion: no-preference) {
    .ticket-highlight-value {
        animation: glowPulse 2s ease-in-out infinite;
    }
}

@keyframes glowPulse {
    0%, 100% {
        text-shadow: 0 0 20px rgba(var(--primary-rgb), 0.4);
    }
    50% {
        text-shadow: 0 0 30px rgba(var(--primary-rgb), 0.7), 0 0 50px rgba(var(--primary-rgb), 0.3);
    }
}


/* ========== 星光竹林暗色模式 ========== */

/* --- 文字色彩 --- */
:host(.dark) .ticket-time-name              { color: var(--ink-light); }
:host(.dark) .ticket-time-value             { color: var(--bamboo-pale-hover); }
:host(.dark) .ticket-highlight-label        { color: var(--ink-medium); }
:host(.dark) .ticket-highlight-value        { color: var(--bamboo-light); text-shadow: 0 0 12px rgba(var(--primary-rgb), 0.3); }
:host(.dark) .stub-title-cn                 { color: var(--bamboo-pale-hover); }
:host(.dark) .stub-title-en                 { color: var(--ink-light); }
:host(.dark) .ticket-slogan                 { color: var(--ink-light); }
:host(.dark) .ticket-stub-date              { color: var(--ink-light); }

/* --- 票体背景与边框 --- */
:host(.dark) .ticket-highlight {
    background: linear-gradient(135deg, rgba(var(--primary-rgb),0.1) 0%, rgba(var(--primary-rgb),0.04) 100%),
                linear-gradient(45deg, rgba(var(--deep-rgb), ) 0%, transparent 60%);
    border: 1px solid rgba(var(--primary-rgb), 0.2);
    box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.1);
}
:host(.dark) .designer-ticket {
    background: rgba(var(--primary-rgb), 0.06);
    border-color: rgba(var(--primary-rgb), 0.12);
}
:host(.dark) .ticket-main::before {
    background: linear-gradient(135deg, rgba(var(--primary-rgb),0.12) 0%, rgba(var(--primary-rgb),0.04) 50%, rgba(var(--primary-rgb),0.08) 100%),
                linear-gradient(45deg, rgba(var(--deep-rgb), ) 0%, transparent 60%);
    box-shadow: 0 4px 20px rgba(var(--black-rgb), 0.3),
                inset 0 2px 0 rgba(var(--primary-rgb),0.2),
                inset 0 -2px 0 rgba(var(--primary-rgb), 0.2),
                inset 2px 0 0 rgba(var(--primary-rgb),0.12),
                inset -2px 0 0 rgba(var(--primary-rgb),0.12);
}
:host(.dark) .ticket-stub {
    background: rgba(var(--primary-rgb), 0.15);
    border-left-color: rgba(var(--primary-rgb), 0.25);
    box-shadow: inset 1px 0 0 rgba(var(--primary-rgb),0.15);
}
:host(.dark) .ticket-stub-title-box {
    background: linear-gradient(135deg, rgba(var(--primary-rgb),0.15) 0%, rgba(var(--primary-rgb),0.06) 50%, rgba(var(--primary-rgb),0.1) 100%),
                linear-gradient(45deg, rgba(var(--deep-rgb), ) 0%, transparent 60%);
    box-shadow: 0 4px 16px rgba(var(--black-rgb), 0.2),
                inset 0 2px 0 rgba(var(--primary-rgb),0.2),
                inset 0 -2px 0 rgba(var(--primary-rgb), 0.15),
                inset 2px 0 0 rgba(var(--primary-rgb),0.12),
                inset -2px 0 0 rgba(var(--primary-rgb),0.12);
}
:host(.dark) .ticket-stub-title-box:hover {
    background: linear-gradient(135deg, rgba(var(--primary-rgb),0.22) 0%, rgba(var(--primary-rgb),0.1) 50%, rgba(var(--primary-rgb),0.16) 100%),
                linear-gradient(45deg, rgba(var(--deep-rgb), ) 0%, transparent 60%);
    box-shadow: 0 4px 16px rgba(var(--black-rgb), 0.3),
                inset 0 2px 0 rgba(var(--primary-rgb),0.3),
                inset 0 -2px 0 rgba(var(--primary-rgb), 0.2),
                inset 2px 0 0 rgba(var(--primary-rgb),0.2),
                inset -2px 0 0 rgba(var(--primary-rgb),0.2);
}

/* --- 装饰 --- */
:host(.dark) .ticket-decoration.left::before {
    background: rgba(var(--primary-rgb), 0.5);
    box-shadow: 16px 0 0 rgba(var(--primary-rgb), 0.35), 32px 0 0 rgba(var(--primary-rgb), 0.2);
}
:host(.dark) .ticket-decoration.right::before {
    background: rgba(var(--primary-rgb), 0.5);
    box-shadow: -16px 0 0 rgba(var(--primary-rgb), 0.35), -32px 0 0 rgba(var(--primary-rgb), 0.2);
}

/* --- 高级克制光效 --- */
:host(.dark) .designer-ticket {
    -webkit-mask-image: radial-gradient(circle 12px at 68% 0, transparent 100%, black 100%),
                        radial-gradient(circle 12px at 68% 100%, transparent 100%, black 100%);
    -webkit-mask-composite: source-in;
    mask-image: radial-gradient(circle 12px at 68% 0, transparent 100%, black 100%),
                radial-gradient(circle 12px at 68% 100%, transparent 100%, black 100%);
    mask-composite: intersect;
    box-shadow: 0 0 50px rgba(var(--primary-rgb), 0.1),
                0 0 100px rgba(var(--primary-rgb), 0.05),
                0 8px 32px rgba(var(--black-rgb), 0.4),
                inset 0 1px 0 rgba(var(--white-rgb), 0.1);
}
:host(.dark) .ticket-main { min-height: 120px; }
:host(.dark) .designer-ticket::after {
    background: linear-gradient(90deg, transparent 0%, rgba(var(--primary-rgb),0.05) 30%, rgba(var(--primary-rgb),0.1) 50%, rgba(var(--primary-rgb),0.05) 70%, transparent 100%);
}
:host(.dark) .ticket-main::before {
    box-shadow: 0 4px 20px rgba(var(--black-rgb), 0.3),
                inset 0 2px 0 rgba(var(--primary-rgb),0.2),
                inset 0 -2px 0 rgba(var(--primary-rgb), 0.2),
                inset 2px 0 0 rgba(var(--primary-rgb),0.12),
                inset -2px 0 0 rgba(var(--primary-rgb),0.12),
                0 0 40px rgba(var(--primary-rgb), 0.08);
}
:host(.dark) .ticket-stub {
    box-shadow: inset 1px 0 0 rgba(var(--primary-rgb),0.15),
                inset 0 0 25px rgba(var(--primary-rgb), 0.06);
}
:host(.dark) .ticket-stub-title-box {
    box-shadow: 0 4px 16px rgba(var(--black-rgb), 0.2),
                inset 0 2px 0 rgba(var(--primary-rgb),0.2),
                inset 0 -2px 0 rgba(var(--primary-rgb), 0.15),
                inset 2px 0 0 rgba(var(--primary-rgb),0.12),
                inset -2px 0 0 rgba(var(--primary-rgb),0.12),
                0 0 25px rgba(var(--primary-rgb), 0.08);
}
:host(.dark) .ticket-highlight {
    box-shadow: 0 0 25px rgba(var(--primary-rgb), 0.15),
                0 0 50px rgba(var(--primary-rgb), 0.08),
                0 4px 16px rgba(var(--black-rgb), 0.2),
                inset 0 2px 0 rgba(var(--primary-rgb),0.25),
                inset 0 -2px 0 rgba(var(--primary-rgb), 0.15);
}

/* --- 活跃度点阵 --- */
:host(.dark) .ticket-dot { background: rgba(var(--primary-rgb), 0.1); box-shadow: inset 0 1px 2px rgba(var(--black-rgb), 0.15); }
:host(.dark) .ticket-dot.has-data { background: rgb(var(--primary-rgb)); box-shadow: inset 0 1px 2px rgba(var(--black-rgb), 0.1), 0 0 4px rgba(var(--primary-rgb), 0.35); }
:host(.dark) .ticket-dot.current { background: var(--bamboo-light); box-shadow: inset 0 1px 2px rgba(var(--black-rgb), 0.1), 0 0 6px rgba(var(--primary-rgb), 0.45); }
:host(.dark) .ticket-dot::after {
    color: var(--bamboo-pale-hover);
    background: rgba(var(--surface-deep-rgb), 0.92);
    border-color: rgba(var(--primary-rgb), 0.12);
    box-shadow: 0 2px 8px rgba(var(--black-rgb), 0.4);
}

/* --- 翻转按钮 --- */
:host(.dark) .flip-stub-btn { color: rgba(var(--primary-rgb), 0.35); }
:host(.dark) .flip-stub-btn:hover { color: var(--bamboo-pale-highlight); background: rgba(var(--primary-rgb), 0.12); }

/* --- 背面面板 --- */
:host(.dark) .stub-back-title-box {
    background: linear-gradient(135deg, rgba(var(--primary-rgb),0.15) 0%, rgba(var(--primary-rgb),0.06) 50%, rgba(var(--primary-rgb),0.1) 100%),
                linear-gradient(45deg, rgba(var(--deep-rgb), ) 0%, transparent 60%);
    box-shadow: 0 4px 16px rgba(var(--black-rgb), 0.2),
                inset 0 2px 0 rgba(var(--primary-rgb),0.2),
                inset 0 -2px 0 rgba(var(--primary-rgb), 0.15),
                inset 2px 0 0 rgba(var(--primary-rgb),0.12),
                inset -2px 0 0 rgba(var(--primary-rgb),0.12);
}
:host(.dark) .stub-back-divider { background: rgba(var(--primary-rgb), 0.1); }
:host(.dark) .stub-back-stat svg { color: rgba(var(--primary-rgb), 0.4); }
:host(.dark) .stub-back-ring { background: conic-gradient(rgb(var(--primary-rgb)) 0deg, rgb(var(--primary-rgb)) calc(var(--ring-pct) * 3.6deg), rgba(var(--primary-rgb),0.08) calc(var(--ring-pct) * 3.6deg)); }
:host(.dark) .stub-back-ring-text { color: var(--bamboo-pale-highlight); }
:host(.dark) .stub-back-caption { color: rgba(var(--bamboo-pale-highlight-rgb), 0.5); }
:host(.dark) .stub-back-stat-value { color: rgba(var(--bamboo-pale-hover-rgb), 0.65); }


/* ========== 暗色模式 — 动画 ========== */

/* 减少动画偏好适配 */
@media (prefers-reduced-motion: reduce) {
    :host(.dark) .designer-ticket::after,
    :host(.dark) .ticket-highlight {
        animation: none;
    }
}

.timeline-bamboo-path { position: relative; padding-left: 40px; }
.timeline-bamboo-path::before {
    content: '';
    position: absolute;
    left: 19px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: repeating-linear-gradient(to bottom, var(--bamboo-primary) 0px, var(--bamboo-primary) 8px, transparent 8px, transparent 16px);
    opacity: 0.4;
    border-radius: var(--radius-3xs);
}

.bamboo-node {
    position: relative;
    margin-bottom: var(--space-4);
}

@media (prefers-reduced-motion: no-preference) {
    .bamboo-node {
        animation: fadeInUp 0.5s ease forwards;
        opacity: 0;
    }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.bamboo-node:nth-child(1) { animation-delay: 0.1s; }
.bamboo-node:nth-child(2) { animation-delay: 0.2s; }
.bamboo-node:nth-child(3) { animation-delay: 0.3s; }
.bamboo-node:nth-child(4) { animation-delay: 0.4s; }
.bamboo-node:nth-child(5) { animation-delay: 0.5s; }
.bamboo-node::before {
    content: '';
    position: absolute;
    left: -40px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: linear-gradient(135deg, var(--bamboo-light), var(--bamboo-primary));
    border-radius: 50%;
    border: 2px solid var(--card-bg);
    box-shadow: 0 0 0 2px var(--bamboo-pale), 0 2px 6px rgba(var(--primary-rgb), 0.3);
    z-index: 2;
    margin-left: 13px;
}
.bamboo-node.focus-now::before {
    box-shadow: 0 0 0 2px var(--bamboo-primary), 0 0 16px rgba(var(--primary-rgb), 0.5);
}

@media (prefers-reduced-motion: no-preference) {
    .bamboo-node.focus-now::before {
        animation: nodeGlow 2s ease-in-out infinite;
    }
}

@keyframes nodeGlow {
    0%, 100% { transform: translateY(-50%) scale(1); }
    50% { transform: translateY(-50%) scale(1.1); }
}

.bamboo-card {
    background: var(--card-bg);
    backdrop-filter: blur(var(--glass-blur));
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-surface);
}
.bamboo-card:hover { transform: translateX(8px); box-shadow: var(--shadow-card); }
.bamboo-card-header {
    padding: var(--space-3) var(--space-4);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    position: relative;
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border-bottom: 1px solid rgba(var(--white-rgb), 0.28);
    overflow: hidden;
}

.bamboo-card-header::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(var(--white-rgb), 0.18) 0%, transparent 55%);
    pointer-events: none;
}

.bamboo-left {
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.bamboo-info {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    min-height: 36px;
}

.bamboo-right {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    flex-shrink: 0;
}

.bamboo-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 1px 2px rgba(var(--black-rgb), 0.08));
    flex-shrink: 0;
    color: var(--bamboo-deep);
}

.bamboo-title {
    display: flex;
    flex-direction: column;
    gap: 1px;
}

.bamboo-name {
    font-size: var(--type-base);
    font-weight: 700;
    color: var(--bamboo-deep);
}

.bamboo-time {
    font-size: var(--type-xs);
    color: var(--bamboo-dark);
    opacity: 0.75;
}

.bamboo-count {
    font-size: var(--type-xs);
    font-weight: 600;
    color: var(--bamboo-primary);
    background: rgba(var(--primary-rgb), 0.06);
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(var(--primary-rgb), 0.15);
    min-width: min(22px, 6vw);
    text-align: center;
    line-height: 1.2;
    opacity: 0.7;
    cursor: default;
}

.bamboo-count:hover {
    opacity: 0.9;

/* === 竹林色阶 — 九段时段系统渐变 === */
/* 深夜（中绿）→ 黎明 → 正午（白绿）→ 傍晚 → 深夜（中绿）*/
/* 每段纯色底色 + ::after 玻璃高光叠加，九段合为 V 形色阶 */

/* 深夜 0-4h — 中绿，色阶最深 */
.bamboo-card.lateNight .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.24);
  transition: background 0.4s ease-out;
}
/* 黎明 4-5.5h — 向白绿过渡 */
.bamboo-card.dawn .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.16);
  transition: background 0.4s ease-out;
}
/* 清晨 5.5-7h — 轻绿 */
.bamboo-card.earlyMorning .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.10);
  transition: background 0.4s ease-out;
}
/* 上午 7-12h — 微绿 */
.bamboo-card.morning .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.06);
  transition: background 0.4s ease-out;
}
/* 中午 12-13h — 白绿，色阶最淡 */
.bamboo-card.midday .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.03);
  transition: background 0.4s ease-out;
}
/* 下午 13-17h — 微绿回升 */
.bamboo-card.afternoon .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.06);
  transition: background 0.4s ease-out;
}
/* 傍晚 17-18.5h — 向中绿过渡 */
.bamboo-card.dusk .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.13);
  transition: background 0.4s ease-out;
}
/* 晚上 18.5-22h — 渐深 */
.bamboo-card.evening .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.18);
  transition: background 0.4s ease-out;
}
/* 深夜 22-24h — 中绿，回归最深 */
.bamboo-card.night .bamboo-card-header {
  background: rgba(var(--primary-rgb), 0.24);
  transition: background 0.4s ease-out;
}

.bamboo-eval {
    font-size: var(--type-xs);
    font-weight: 600;
    padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-3xl);
    white-space: nowrap;
}

.bamboo-eval.good {
    background: rgba(var(--primary-rgb), 0.15);
    color: var(--bamboo-primary);
    border: 1px solid rgba(var(--primary-rgb), 0.3);
}

.bamboo-eval.warn {
    background: rgba(var(--warning-orange-rgb), 0.12);
    color: var(--bamboo-warning);
    border: 1px solid rgba(var(--warning-orange-rgb), 0.3);
}

.bamboo-eval.bad {
    background: rgba(var(--danger-rgb), 0.12);
    color: var(--cinnabar);
    border: 1px solid rgba(var(--danger-rgb), 0.3);
}

:host(.dark) .bamboo-eval.good {
    color: var(--bamboo-light);
    background: rgba(var(--primary-rgb), 0.2);
    border-color: rgba(var(--primary-rgb), 0.4);
}

:host(.dark) .bamboo-eval.warn {
    color: rgba(var(--amber-rgb), 0.9);
    background: rgba(var(--warning-orange-rgb), 0.2);
    border-color: rgba(var(--warning-orange-rgb), 0.4);
}

:host(.dark) .bamboo-eval.bad {
    color: rgba(var(--danger-bright-rgb), 0.85);
    background: rgba(var(--danger-rgb), 0.2);
    border-color: rgba(var(--danger-rgb), 0.4);
}

/* 暗色模式：抬头元素用亮绿，与深色玻璃底色区分 */
:host(.dark) .bamboo-icon {
    color: var(--bamboo-light);
    filter: drop-shadow(0 1px 2px rgba(var(--black-rgb), 0.2));
}

:host(.dark) .bamboo-name {
    color: var(--bamboo-light);
}

:host(.dark) .bamboo-time {
    color: var(--bamboo-pale);
    opacity: 0.75;
}

:host(.dark) .bamboo-count {
    color: rgba(var(--green-bright-rgb), 0.8);
    background: rgba(var(--primary-rgb), 0.12);
    border-color: rgba(var(--primary-rgb), 0.25);
    opacity: 0.6;
}

:host(.dark) .bamboo-count:empty,
:host(.dark) .bamboo-count[data-count="0"] {
    opacity: 0.25;
}

/* Custom Tooltip */
.bamboo-tooltip {
    position: fixed;
    background: var(--bamboo-primary);
    color: white;
    padding: 5px 10px;
    border-radius: var(--radius-2xs);
    font-size: var(--type-mini);
    font-weight: 400;
    white-space: nowrap;
    pointer-events: none;
    z-index: 9999;
    line-height: 1.3;
    box-shadow: 0 3px 8px rgba(var(--black-rgb), 0.12), 0 1px 4px rgba(var(--black-rgb), 0.06);
    opacity: 0;
    transition: opacity 0.1s ease;
}

.bamboo-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--bamboo-primary);
}

:host(.dark) .bamboo-tooltip {
    background: var(--bamboo-primary);
    color: white;
}

:host(.dark) .bamboo-tooltip::after {
    border-top-color: var(--bamboo-primary);
}

.bamboo-card-content {
    max-height: 500px;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease;
}

.bamboo-card-content.collapsed {
    max-height: 0;
    opacity: 0;
}

.bamboo-items {
    padding: var(--space-3) var(--space-4);
    border-top: 1px dashed var(--border-light);
}

.bamboo-item {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    padding: var(--space-2) 0;
    border-bottom: 1px solid rgba(var(--primary-rgb), 0.08);
}

.bamboo-item:last-child {
    border-bottom: none;
}

.bamboo-item-time {
    font-size: var(--type-sm);
    font-weight: 600;
    color: var(--text-secondary);
    min-width: min(50px, 14vw);
    flex-shrink: 0;
}

.bamboo-item-content {
    flex: 1;
}

.bamboo-item-task {
    font-size: var(--type-base);
    color: var(--text-primary);
    line-height: 1.5;
}

.bamboo-item-eval {
    font-size: var(--type-xs);
    color: var(--bamboo-primary);
    margin-top: 3px;
    font-style: italic;
}

.bamboo-item-eval.warn {
    color: var(--bamboo-primary);
}

.bamboo-leaf {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-size: var(--type-md);
    opacity: 0;
    transition: opacity 0.3s;
}

.bamboo-card:hover .bamboo-leaf {
    opacity: 0.6;
}

/* =============================================
   响应式 — 票根布局
   Canonical breakpoints: 480px (mobile), 768px (tablet), 1024px (desktop)
   ============================================= */

/* ≤768px: 票体+票根上下堆叠，票根内容横向排列 */
@media (max-width: 768px) {
    .designer-ticket,
    :host(.dark) .designer-ticket,
    :host(.dark) .designer-ticket {
        flex-direction: column;
        -webkit-mask-image: none;
        -webkit-mask-composite: initial;
        mask-image: none;
        mask-composite: initial;
        border-radius: var(--radius-xl);
    }

    .ticket-main {
        flex: auto;
        width: 100%;
        padding: 20px 14px 10px;
    }

    .ticket-main::before {
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 6px;
        border-radius: var(--radius-md);
    }

    .ticket-main::after {
        top: 10px;
        left: 10px;
        right: 10px;
    }

    .ticket-body {
        gap: 10px;
    }

    .ticket-time-value { font-size: var(--type-xl); }

    .ticket-highlight {
        width: 110px;
        height: auto;
        padding: 8px 10px;
        border-radius: var(--radius-md);
    }

    .ticket-highlight-value { font-size: var(--type-lg); }

    .ticket-highlight-label { font-size: var(--type-mini); letter-spacing: 1.5px; }

    .ticket-stub {
        flex: auto;
        width: 100%;
        border-left: none;
        border-top: none;
        box-shadow: none;
        height: auto;
        min-height: 84px;
        perspective: 1000px;
    }

    .ticket-stub.playing {
        box-shadow: 0 0 0 2px rgba(var(--primary-rgb), 0.45),
                    0 4px 20px rgba(var(--primary-rgb), 0.3);
    }

    .ticket-stub-content {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: var(--space-3);
        padding: 10px 12px;
    }

    .ticket-stub-content > * { pointer-events: auto; }

    .ticket-stub-title-box {
        width: min(110px, 30vw);
        min-height: auto;
        height: auto;
        padding: 12px 8px;
        font-size: 0;
        text-align: center;
        display: block;
    }

    .stub-title-cn { display: inline; font-size: var(--type-sm); letter-spacing: 2px; line-height: 1.4; }

    .ticket-stub-date { display: block; font-size: var(--type-mini); line-height: 1.4; }

    .stub-noise-ctrl { height: auto; }

    .flip-stub-btn { top: 6px; right: 10px; }

    .ticket-flip-container {
        width: 100%;
        min-height: 84px;
    }

    .ticket-flip-container.flipped {
        transform: none;
    }

    .ticket-flip-front {
        position: relative;
        inset: auto;
        min-height: 84px;
        backface-visibility: visible;
    }

    .ticket-flip-back {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        min-height: 84px;
        backface-visibility: visible;
        transform: none;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .ticket-flip-container.flipped .ticket-flip-front {
        opacity: 0;
        pointer-events: none;
    }

    .ticket-flip-container.flipped .ticket-flip-back {
        opacity: 1;
        pointer-events: auto;
    }

    .stub-back-content {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: var(--space-3);
        padding: 10px 12px;
    }

    .stub-back-title-box { width: 200px; }

    .stub-back-row { gap: var(--space-3); }

    .ticket-decorations { gap: var(--space-2); }

    .ticket-slogan { letter-spacing: 3px; }
}

@media (max-width: 480px) {

    }

    -webkit-mask-image: none;

    border-color: rgba(var(--warning-orange-rgb), 0.2);
}

.stat-icon {
    font-size: var(--type-mega);
    margin-bottom: 8px;
}

.stat-value {
    font-size: var(--type-mega);
    font-weight: 800;
    color: var(--bamboo-deep);
    line-height: 1;
}

.stat-label {
    font-size: var(--type-sm);
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 500;
}

/* 时间预警列表 */
.time-alert-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.time-alert {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 14px;
    background: rgba(var(--white-rgb), 0.8);
    border: 1px solid rgba(var(--primary-rgb),0.1);
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
}

.time-alert:hover {
    transform: translateX(4px);
    box-shadow: 0 4px 12px rgba(var(--deep-rgb),0.08);
}

.time-alert.danger {
    border-color: rgba(var(--warning-orange-rgb), 0.3);
    background: linear-gradient(135deg, rgba(var(--warning-orange-rgb), 0.08), rgba(var(--warning-orange-rgb), 0.05));
}

.time-alert.warning {
    border-color: rgba(var(--warning-orange-rgb), 0.2);
    background: linear-gradient(135deg, rgba(var(--warning-orange-rgb), 0.05), rgba(var(--warning-orange-rgb), 0.03));
}

.time-alert.error {
    border-color: rgba(var(--danger-alt-rgb), 0.3);
    background: linear-gradient(135deg, rgba(var(--danger-alt-rgb), 0.08), rgba(var(--danger-alt-rgb), 0.05));
}

.alert-icon {
    font-size: var(--type-hero);
}

.alert-content {
    flex: 1;
}

.alert-title {
    font-size: var(--type-base);
    font-weight: 700;
    color: var(--bamboo-deep);
    margin-bottom: 2px;
}

.alert-desc {
    font-size: var(--type-micro);
    color: var(--text-secondary);
}

.alert-badge {
    font-size: var(--type-md);
    font-weight: 800;
    padding: 4px 10px;
    background: rgba(var(--primary-rgb),0.1);
    color: var(--bamboo-primary);
    border-radius: var(--radius-sm);
}

.time-alert.danger .alert-badge {
    background: rgba(var(--warning-orange-rgb), 0.15);
    color: var(--health-warning);
}

.time-alert.error .alert-badge {
    background: rgba(var(--danger-alt-rgb), 0.15);
    color: rgb(var(--danger-alt-rgb));
}

/* 状态分布 */
.status-distribution {
    display: flex;
    gap: var(--space-5);
    align-items: center;
    padding: 18px;
    background: linear-gradient(135deg, rgba(var(--white-rgb), 0.95), rgba(var(--pale-green-alt-rgb), 0.9));
    border-radius: var(--radius-xl);
    border: 1px solid rgba(var(--primary-rgb),0.12);
}

.pie-chart-wrapper {
    flex-shrink: 0;
    width: clamp(100px, 32vw, 140px);
    height: clamp(100px, 32vw, 140px);
}

.rw-460 .status-distribution {
    gap: 14px;
    padding: 14px;
}

.status-legend {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}

.legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(var(--white-rgb), 0.8);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(var(--primary-rgb),0.08);
    transition: all 0.2s ease;
}

.legend-item:hover {
    transform: translateX(4px);
    border-color: rgba(var(--primary-rgb),0.15);
}

.legend-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(var(--white-rgb), 0.6);
}

.legend-label {
    font-size: var(--type-base);
    font-weight: 600;
    color: var(--bamboo-deep);
}

.legend-value {
    font-size: var(--type-heading);
    font-weight: 900;
    color: var(--bamboo-deep);
}

/* 进度梯队 */
.progress-tiers {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.progress-tier {
    background: rgba(var(--white-rgb), 0.8);
    border: 1px solid rgba(var(--primary-rgb),0.08);
    border-radius: var(--radius-md);
    padding: 12px 14px;
}

.tier-bar-wrapper {
    position: relative;
    height: 20px;
    background: rgba(var(--primary-rgb),0.06);
    border-radius: var(--radius-sm);
    overflow: hidden;
}

.tier-bar {
    height: 100%;
    border-radius: var(--radius-sm);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.tier-info {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
}

.tier-label {
    font-size: var(--type-micro);
    font-weight: 600;
    color: var(--text-secondary);
}

.tier-count {
    font-size: var(--type-base);
    font-weight: 800;
    color: var(--bamboo-deep);
}

/* 分类进度 */
.category-progress {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.category-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(var(--white-rgb), 0.55);
    backdrop-filter: blur(var(--glass-blur));
    border: 1px solid rgba(var(--primary-rgb),0.1);
    border-radius: var(--radius-md);
}

.category-name {
    font-size: var(--type-sm);
    font-weight: 500;
    color: var(--bamboo-deep);
    min-width: 50px;
}

.category-bar-wrapper {
    flex: 1;
    height: 5px;
    background: rgba(var(--primary-rgb),0.06);
    border-radius: var(--radius-2-5);
    overflow: hidden;
}

.category-bar {
    height: 100%;
    border-radius: var(--radius-2-5);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.category-value {
    font-size: var(--type-base);
    font-weight: 700;
    color: var(--bamboo-deep);
    min-width: 40px;
    text-align: right;
}

/* 分类空状态 */
.category-empty-state {
    text-align: center;
    padding: 24px 16px;
    background: rgba(var(--white-rgb), 0.6);
    border-radius: var(--radius-md);
    border: 1px dashed rgba(var(--primary-rgb), 0.2);
}

.category-empty-state-text {
    font-size: var(--type-base);
    color: var(--text-secondary);
}

/* 优先级分布 */
.priority-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.priority-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    background: rgba(var(--white-rgb), 0.8);
    border: 1px solid rgba(var(--primary-rgb),0.08);
}

.priority-item.high {
    border-color: rgba(var(--danger-alt-rgb), 0.2);
    background: linear-gradient(135deg, rgba(var(--danger-alt-rgb), 0.06), rgba(var(--danger-alt-rgb), 0.03));
}

.priority-item.medium {
    border-color: rgba(var(--warning-orange-rgb), 0.2);
    background: linear-gradient(135deg, rgba(var(--warning-orange-rgb), 0.06), rgba(var(--warning-orange-rgb), 0.03));
}

.priority-item.low {
    border-color: rgba(var(--gray-rgb), 0.2);
    background: linear-gradient(135deg, rgba(var(--gray-rgb), 0.06), rgba(var(--gray-rgb), 0.03));
}

.priority-label {
    font-size: var(--type-base);
    font-weight: 600;
    color: var(--text-secondary);
}

.priority-value {
    font-size: var(--type-large);
    font-weight: 800;
}

.priority-item.high .priority-value {
    color: rgb(var(--danger-alt-rgb));
}

.priority-item.medium .priority-value {
    color: var(--health-warning);
}

.priority-item.low .priority-value {
    color: var(--health-neutral);
}

/* 热力图 */
.heatmap-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 14px;
    background: rgba(var(--white-rgb), 0.8);
    border: 1px solid rgba(var(--primary-rgb),0.08);
    border-radius: var(--radius-md);
}

.heatmap-day {
    width: clamp(22px, 7vw, 28px);
    height: clamp(22px, 7vw, 28px);
    border-radius: var(--radius-2xs);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--type-micro);
    color: var(--text-tertiary);
    transition: all 0.2s ease;
}

.heatmap-day:hover {
    transform: scale(1.15);
    box-shadow: 0 4px 12px rgba(var(--black-rgb), 0.1);
}

/* 空状态 */
.empty-state {
    text-align: center;
    padding: var(--space-6);
}

.empty-state.large {
    padding: 48px 24px;
}

.empty-icon {
    font-size: var(--type-display-big);
    margin-bottom: 12px;
}

.empty-text {
    font-size: var(--type-md);
    font-weight: 600;
    color: var(--bamboo-deep);
    margin-bottom: 4px;
}

.empty-desc {
    font-size: var(--type-sm);
    color: var(--text-secondary);
}

/* 已完成目标列表 */
.completed-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.completed-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: linear-gradient(135deg, rgba(var(--health-success-rgb), 0.08), rgba(var(--mint-rgb), 0.05));
    border: 1px solid rgba(var(--health-success-rgb), 0.15);
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
}

.completed-item:hover {
    transform: translateX(4px);
    box-shadow: 0 4px 12px rgba(var(--health-success-rgb), 0.1);
}

.completed-icon {
    font-size: var(--type-heading);
}

.completed-title {
    flex: 1;
    font-size: var(--type-base);
    color: var(--bamboo-deep);
    font-weight: 500;
}

.completed-more {
    padding: 10px 14px;
    text-align: center;
    font-size: var(--type-sm);
    color: var(--text-secondary);
}

/* 时间跨度分布 */
.time-span-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.time-span-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: rgba(var(--white-rgb), 0.8);
    border-radius: var(--radius-md);
    border: 1px solid rgba(var(--primary-rgb),0.08);
}

.time-span-item.short {
    border-color: rgba(var(--primary-rgb),0.2);
    background: linear-gradient(135deg, rgba(var(--primary-rgb),0.08), rgba(var(--primary-rgb), 0.05));
}

.time-span-item.medium {
    border-color: rgba(var(--warning-orange-rgb), 0.2);
    background: linear-gradient(135deg, rgba(var(--warning-orange-rgb), 0.08), rgba(var(--warning-orange-rgb), 0.05));
}

.time-span-item.long {
    border-color: rgba(var(--purple-rgb), 0.2);
    background: linear-gradient(135deg, rgba(var(--purple-rgb), 0.08), rgba(var(--purple-pale-rgb), 0.05));
}

.time-span-label {
    font-size: var(--type-base);
    font-weight: 600;
    color: var(--bamboo-deep);
}

.time-span-desc {
    font-size: var(--type-micro);
    color: var(--text-secondary);
    margin-left: 8px;
}

.time-span-value {
    font-size: var(--type-hero);
    font-weight: 800;
}

.time-span-item.short .time-span-value {
    color: var(--bamboo-primary);
}

.time-span-item.medium .time-span-value {
    color: var(--health-warning);
}

.time-span-item.long .time-span-value {
    color: rgb(var(--purple-rgb));
}

/* 时间跨度分布 - 横版布局 */
.time-span-horizontal {
    display: flex;
    gap: var(--space-3);
}

.time-span-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px;
    background: rgba(var(--white-rgb), 0.95);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(var(--primary-rgb),0.08);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    min-width: 100px;
    position: relative;
    overflow: hidden;
}

.time-span-card:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 24px rgba(var(--black-rgb), 0.1);
}

.time-span-card.active {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(var(--black-rgb), 0.12);
}

.time-span-card.short {
    border-color: rgba(var(--primary-rgb),0.35);
    background: linear-gradient(135deg, rgba(var(--primary-rgb),0.14), rgba(var(--primary-rgb), 0.085));
    color: var(--bamboo-primary);
}

.time-span-card.medium {
    border-color: rgba(var(--warning-orange-rgb), 0.35);
    background: linear-gradient(135deg, rgba(var(--warning-orange-rgb), 0.14), rgba(var(--warning-orange-rgb), 0.085));
    color: var(--health-warning);
}

.time-span-card.long {
    border-color: rgba(var(--purple-rgb), 0.35);
    background: linear-gradient(135deg, rgba(var(--purple-rgb), 0.14), rgba(var(--purple-pale-rgb), 0.085));
    color: rgb(var(--purple-rgb));
}

.time-span-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 10px;
}

.time-span-card .time-span-label {
    font-size: var(--type-base);
    font-weight: 600;
    color: var(--bamboo-deep);
    margin: 0;
    margin-bottom: 2px;
}

.time-span-card .time-span-desc {
    font-size: var(--type-micro);
    color: var(--text-secondary);
    margin: 0;
}

.time-span-card .time-span-value {
    font-size: var(--type-mega);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 4px;
}

.time-span-card.short .time-span-value {
    color: var(--bamboo-primary);
}

.time-span-card.medium .time-span-value {
    color: var(--health-warning);
}

.time-span-card.long .time-span-value {
    color: rgb(var(--purple-rgb));
}

.time-span-percent {
    font-size: var(--type-micro);
    color: var(--text-secondary);
    font-weight: 500;
}

/* 响应式布局 - rw-460 */
.rw-460 .time-span-horizontal {
    flex-direction: column;
    gap: 10px;
}

.rw-460 .time-span-card {
    flex-direction: row;
    justify-content: space-between;
    padding: 14px 16px;
    min-width: auto;
}

.rw-460 .time-span-info {
    align-items: flex-start;
    margin-bottom: 0;
}

.rw-460 .time-span-card .time-span-value {
    font-size: var(--type-hero);
    margin-bottom: 0;
}

.rw-460 .time-span-percent {
    margin-left: 12px;
}

/* 成就展示 */
.achievements-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: var(--space-3);
}

.achievements-horizontal {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
}

.achievement-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px;
    background: linear-gradient(135deg, rgba(var(--gold-bright-rgb), 0.1), rgba(255,250,205,0.08));
    border: 1px solid rgba(var(--warning-orange-rgb), 0.2);
    border-radius: var(--radius-lg);
    text-align: center;
    transition: all 0.2s ease;
}

.achievement-card-horizontal {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 12px 16px;
    background: linear-gradient(135deg, rgba(var(--gold-bright-rgb), 0.1), rgba(255,250,205,0.08));
    border: 1px solid rgba(var(--warning-orange-rgb), 0.2);
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
}

.achievement-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(var(--warning-orange-rgb), 0.15);
}

.achievement-card-horizontal:hover {
    transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(var(--warning-orange-rgb), 0.15);
    background: linear-gradient(135deg, rgba(var(--gold-bright-rgb), 0.15), rgba(255,250,205,0.12));
}

.achievement-content-horizontal {
    flex: 1;
    min-width: 0;
}

.achievement-content-horizontal .achievement-title {
    display: block;
    font-size: var(--type-base);
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
}

.achievement-content-horizontal .achievement-desc {
    display: block;
    font-size: var(--type-micro);
    color: var(--text-secondary);
}

.achievement-icon {
    font-size: var(--type-mega);
    margin-bottom: 8px;
}

.achievement-title {
    font-size: var(--type-base);
    font-weight: 700;
    color: var(--bamboo-deep);
    margin-bottom: 4px;
}

.achievement-desc {
    font-size: var(--type-micro);
    color: var(--text-secondary);
}

/* 活跃指标 */
.activity-metrics {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.activity-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: rgba(var(--white-rgb), 0.55);
    backdrop-filter: blur(var(--glass-blur));
    border-radius: var(--radius-md);
    border: 1px solid rgba(var(--primary-rgb),0.1);
}

.activity-label {
    font-size: var(--type-sm);
    font-weight: 600;
    color: var(--text-secondary);
}

.activity-value {
    font-size: var(--type-heading);
    font-weight: 700;
    color: var(--bamboo-primary);
}

/* 对比分析 */
.comparison-stats {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.comparison-item {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
}

.comparison-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.comparison-label {
    font-size: var(--type-base);
    font-weight: 600;
    color: var(--text-secondary);
}

.comparison-value {
    font-size: var(--type-heading);
    font-weight: 800;
}

.comparison-bar {
    height: 5px;
    background: rgba(var(--primary-rgb),0.08);
    border-radius: var(--radius-2-5);
    overflow: hidden;
}

.comparison-bar-fill {
    height: 100%;
    border-radius: var(--radius-2-5);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.comparison-bar-fill.completed {
    background: var(--bamboo-primary);
}

.comparison-bar-fill.in-progress {
    background: var(--health-warning);
}

.comparison-bar-fill.not-started {
    background: #BDC3C7;
}

.comparison-item:nth-child(1) .comparison-value {
    color: var(--health-success-clr);
}

.comparison-item:nth-child(2) .comparison-value {
    color: var(--health-warning);
}

.comparison-item:nth-child(3) .comparison-value {
    color: var(--health-neutral);
}

.philosophy-card {
    padding: var(--space-4);
    background: linear-gradient(135deg, rgba(var(--white-rgb), 0.95) 0%, rgba(var(--pale-green-rgb), 0.9) 100%);
    border-radius: var(--radius-xl);
    border: 1px solid rgba(var(--primary-rgb), 0.1);
    box-shadow: 0 1px 0 rgba(var(--white-rgb), 0.8) inset, 0 4px 16px rgba(var(--deep-rgb), 0.06);
}

.philosophy-item {
    display: flex;
    gap: var(--space-4);
    padding: 18px;
    margin-bottom: 12px;
    background: rgba(var(--white-rgb), 0.65);
    backdrop-filter: blur(var(--glass-blur));
    border-radius: var(--radius-md);
    border: 1px solid rgba(var(--primary-rgb), 0.1);
    transition: all 0.2s ease;
    align-items: flex-start;
}

.philosophy-item:last-child {
    margin-bottom: 0;
}

.philosophy-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(var(--deep-rgb), 0.08);
}

.philosophy-icon {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 2px;
}

.philosophy-icon svg {
    flex-shrink: 0;
}

.philosophy-content {
    flex: 1;
}

.philosophy-title {
    font-size: var(--type-md);
    font-weight: 700;
    color: var(--bamboo-deep);
    margin-bottom: 6px;
}

.philosophy-desc {
    font-size: var(--type-sm);
    color: var(--text-secondary);
    line-height: 1.6;
}

.rating-card {
    padding: var(--space-4);
    background: linear-gradient(135deg, rgba(var(--white-rgb), 0.95) 0%, rgba(var(--pale-green-rgb), 0.9) 100%);
    border-radius: var(--radius-xl);
    border: 1px solid rgba(var(--primary-rgb), 0.1);
    box-shadow: 0 1px 0 rgba(var(--white-rgb), 0.8) inset, 0 4px 16px rgba(var(--deep-rgb), 0.06);
}

.rating-tier {
    display: grid;
    grid-template-columns: 80px 100px 1fr;
    gap: var(--space-4);
    align-items: center;
    padding: 18px;
    margin-bottom: 12px;
    background: rgba(var(--white-rgb), 0.8);
    border-radius: var(--radius-md);
    border: 1px solid rgba(var(--primary-rgb), 0.06);
    transition: all 0.2s ease;
}

.rating-tier:last-child {
    margin-bottom: 0;
}

    transition: color 0.3s ease;
}

.bamboo-progress-unit {
    font-size: var(--type-md);
    font-weight: 300;
    color: var(--bamboo-primary);
    opacity: 0.6;
    margin-left: 2px;
}

.bamboo-progress-meta {
    margin-top: var(--space-1);
}

.bamboo-progress-status {
    font-size: var(--type-base);
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
}

.bamboo-progress-detail {
    font-size: var(--type-sm);
    font-weight: 300;
    color: var(--text-secondary);
    opacity: 0.6;
}

/* 不同进度阶段的字重变化 */
.bamboo-progress-num[data-level="0"] { font-weight: 200; color: var(--text-tertiary); }
.bamboo-progress-num[data-level="1"] { font-weight: 300; color: var(--text-secondary); }
.bamboo-progress-num[data-level="2"] { font-weight: 400; color: var(--text-secondary); }
.bamboo-progress-num[data-level="3"] { font-weight: 500; color: var(--bamboo-primary); }
.bamboo-progress-num[data-level="4"] { font-weight: 600; color: var(--bamboo-primary); }
.bamboo-progress-num[data-level="5"] { font-weight: 700; color: var(--bamboo-primary); }

.goal-progress-visual {
    display: flex;
    gap: var(--space-4);
    align-items: center;
}

.goal-progress-chart-container {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
}

#goalProgressChart {
    width: 100px;
    height: 100px;
}

.goal-progress-chart-value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: var(--type-lg);
    font-weight: 700;
    color: var(--bamboo-primary);
}

.goal-progress-controls {
    flex: 1;
}

.goal-progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-2);
}

.goal-progress-value {
    font-size: var(--type-xl);
    font-weight: 700;
    color: var(--bamboo-primary);
}

.goal-progress-slider-wrapper {
    position: relative;
    margin-bottom: var(--space-2);
}

.goal-progress-slider {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

.goal-progress-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--bamboo-primary);
    border: 3px solid white;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: all 0.2s ease;
}

.goal-progress-slider::-webkit-slider-thumb:hover {
    transform: scale(1.2);
}

.goal-progress-track {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 4px;
    transform: translateY(-50%);
    background: var(--bamboo-border);
    border-radius: var(--radius-3xs);
    overflow: hidden;
    pointer-events: none;
}

.goal-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--bamboo-primary), var(--bamboo-primary-light));
    border-radius: var(--radius-3xs);
    transition: width 0.2s ease;
}

.goal-progress-quick-btns {
    display: flex;
    gap: var(--space-2);
    justify-content: space-between;
}

.goal-progress-btn {
    flex: 1;
    padding: var(--space-2);
    border: 1px solid var(--bamboo-border);
    border-radius: var(--radius-md);
    background: var(--bamboo-background);
    font-size: var(--type-sm);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
}

.goal-progress-btn:hover {
    border-color: var(--bamboo-primary);
    color: var(--bamboo-primary);
    background: rgba(var(--primary-rgb), 0.08);
}

/* 移动端适配 - rw-460 */
.rw-460 .goal-progress-visual {
    flex-direction: column;
}

.rw-460 .goal-progress-chart-container {
    width: 80px;
    height: 80px;
}

.rw-460 #goalProgressChart {
    width: 80px;
    height: 80px;
}

.rw-460 .goal-progress-chart-value {
    font-size: var(--type-base);
}

.rw-460 .goal-row-main {
    padding: var(--space-2) var(--space-3);
    gap: var(--space-2);
}

.rw-460 .goal-row-icon {
    font-size: var(--type-heading);
}

.rw-460 .goal-row-header {
    gap: var(--space-1);
}

.rw-460 .goal-row-category {
    order: -1;
}

.rw-460 .goal-item-row {
    gap: var(--space-1);
}

.rw-460 .goal-item-name {
    font-size: var(--type-xs);
}

.rw-460 .goal-item-meta {
    gap: var(--space-1);
}

.rw-460 .goal-item-daily,
.rw-460 .goal-item-date {
    display: none;
}

.rw-460 .goal-item-value,
.rw-460 .goal-item-daily {
    font-size: var(--type-xs);
}

.rw-460 .goal-editor-v2 {
    max-height: 85vh;
    padding: var(--space-3);
}

.rw-460 .goal-editor-section {
    padding: var(--space-3);
}

.rw-460 .goal-field-input,
.rw-460 .goal-field-select {
    font-size: var(--type-md);
}

.rw-460 .goal-progress-quick-btns {
    flex-wrap: wrap;
}

.rw-460 .goal-progress-btn {
    padding: var(--space-1) var(--space-2);
    font-size: var(--type-xs);
}

.rw-460 .goal-icon-grid {

}

.rw-460 .goal-icon-option {
