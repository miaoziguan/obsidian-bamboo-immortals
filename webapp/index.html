<script type="module">
// 模块入口：所有模块脚本按 DOM 顺序执行，此时 DOM 已就绪
document.body.classList.add('loading');

try {
    renderSkeleton();
} catch (e) {
    console.error('renderSkeleton error:', e.message);
}

try {
    await Promise.race([
        store.initPromise,
        new Promise((_, reject) => setTimeout(() => reject(new Error('store.initPromise timeout')), 10000))
    ]);
} catch (e) {
    console.error('Store init failed:', e.message);
}

setTimeout(() => {
    const inits = [
        ['SectionManager', () => SectionManager.init()],
        ['Todo',            () => Todo.init()],
        ['Render',          () => renderAll()],
        ['Handlers',        () => Handlers.init()],
        ['SettingsModal',   () => SettingsModal.init()],
        ['ActionDispatcher',() => ActionDispatcher.init()],
        ['DisplayManager',  () => DisplayManager.init()],
    ];
    for (const [name, fn] of inits) {
        try { fn(); } catch (e) {
            console.error('[Bamboo] ' + name + ' init failed:', e);
        }
    }

    document.body.classList.remove('loading');

    const hasData = Object.keys(store.getState().data || {}).length > 0;
    if (!hasData) {
        setTimeout(() => {
            try { Handlers.showQuickStartGuide(); } catch(e) {}
        }, 500);
    }
}, 100);

const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
if (motionQuery.matches) {
    document.body.classList.add('motion-reduced');
}
motionQuery.addEventListener('change', (e) => {
    document.body.classList.toggle('motion-reduced', e.matches);
});
</script>
